<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mes trames — Florita</title>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #FAFAF8; --violet: #6B4C9A; --violet-dark: #5A3D87;
      --rose: #D4537E; --text: #2C2C2A; --grey: #637080;
      --border: #D0D7DE; --border-light: #E8E4F0;
    }
    body { font-family: 'Quicksand', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    .layout { display: flex; min-height: 100vh; }

    .main { flex: 1; padding: 2.6rem 3rem; max-width: 1100px; }

    .page-head {
      display: flex; align-items: flex-start; justify-content: space-between;
      gap: 1rem; margin-bottom: 2rem; flex-wrap: wrap;
    }
    .page-head h1 { font-size: 1.9rem; font-weight: 700; color: var(--text); }
    .page-head p { color: var(--grey); font-size: 0.95rem; margin-top: 0.35rem; }
    .page-actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; padding-top: 0.3rem; }

    .btn-action {
      display: inline-flex; align-items: center; gap: 6px;
      font-family: inherit; font-size: 0.85rem; font-weight: 700;
      padding: 0.5rem 1rem; border-radius: 7px; cursor: pointer;
      border: 1px solid var(--border); background: #fff; color: var(--text);
      text-decoration: none; transition: border-color 0.12s, color 0.12s;
      white-space: nowrap;
    }
    .btn-action:hover { border-color: var(--violet); color: var(--violet); }
    .btn-primary {
      background: linear-gradient(135deg, #D4537E 0%, #6B4C9A 100%);
      color: #fff; border-color: transparent;
    }
    .btn-primary:hover { opacity: 0.88; color: #fff; border-color: transparent; }

    .trames-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 18px;
    }

    .trame-card {
      background: #fff; border: 1px solid var(--border-light); border-radius: 14px;
      padding: 1.4rem 1.5rem;
      display: flex; flex-direction: column; gap: 0.7rem;
      transition: box-shadow 0.15s, transform 0.15s;
    }
    .trame-card:hover { box-shadow: 0 6px 22px rgba(107,76,154,0.10); transform: translateY(-1px); }

    .trame-card-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 0.5rem; }
    .trame-nom { font-size: 1rem; font-weight: 700; color: var(--text); line-height: 1.3; }

    .trame-desc { font-size: 0.86rem; color: var(--grey); line-height: 1.5; }

    .trame-actions { display: flex; gap: 8px; margin-top: 0.3rem; flex-wrap: wrap; }
    .btn-trame {
      font-family: inherit; font-size: 0.82rem; font-weight: 700;
      padding: 0.4rem 0.9rem; border-radius: 6px; cursor: pointer;
      border: 1px solid var(--border); background: #fff; color: var(--text);
      text-decoration: none; transition: border-color 0.12s, color 0.12s;
    }
    .btn-trame:hover { border-color: var(--violet); color: var(--violet); }
    .btn-trame-danger { color: #D94F4F; border-color: #F0D5D5; }
    .btn-trame-danger:hover { background: #FFF0F0; border-color: #D94F4F; }

    .trame-preview {
      display: none;
      margin-top: 0.5rem;
      padding: 0.7rem 0.9rem;
      background: #f8f7fc;
      border: 1px solid var(--border-light);
      border-radius: 8px;
      font-size: 0.76rem;
      font-family: 'Courier New', monospace;
      white-space: pre-wrap;
      color: var(--grey);
      max-height: 260px;
      overflow-y: auto;
      line-height: 1.5;
    }
    .trame-preview.open { display: block; }

    .grid-loading { grid-column: 1 / -1; text-align: center; padding: 3rem 1rem; color: var(--grey); }
    .spinner {
      width: 30px; height: 30px; margin: 0 auto 0.8rem;
      border: 3px solid var(--border-light); border-top-color: var(--violet);
      border-radius: 50%; animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .toast {
      position: fixed; bottom: 2rem; right: 2rem;
      background: var(--violet); color: #fff;
      padding: 0.75rem 1.3rem; border-radius: 10px;
      font-size: 0.88rem; font-weight: 600;
      box-shadow: 0 4px 16px rgba(107,76,154,0.3);
      opacity: 0; transform: translateY(8px);
      transition: opacity 0.25s, transform 0.25s;
      pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateY(0); }

    @media (max-width: 820px) {
      .main { padding: 1.5rem 1.2rem; }
      .trames-grid { grid-template-columns: 1fr; }
    }
    .page-footer { margin-top: 2.5rem; padding-top: 1rem; border-top: 1px solid var(--border-light); text-align: center; }
    .page-footer a { font-size: 0.78rem; color: var(--grey); text-decoration: none; font-weight: 500; }
    .page-footer a:hover { color: var(--violet); text-decoration: underline; }
  </style>
</head>
<body>
<div class="layout">

  <aside class="sidebar" id="sidebar"></aside>

  <main class="main">
    <div class="page-head">
      <div>
        <h1>Mes trames</h1>
        <p>Gérez vos modèles de comptes rendus.</p>
      </div>
      <div class="page-actions">
        <label class="btn-action btn-primary" id="import-zone">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          Importer un .docx
          <input type="file" id="import-input" accept=".docx" style="display:none" />
        </label>
        <a href="trames-edit.html" class="btn-action">+ Nouvelle trame</a>
      </div>
    </div>

    <div class="trames-grid" id="trames-grid">
      <div class="grid-loading"><div class="spinner"></div>Chargement…</div>
    </div>
    <footer class="page-footer">
      <a href="cgu.html">Conditions générales d'utilisation</a>
    </footer>
  </main>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="sidebar.js"></script>
<script src="https://unpkg.com/mammoth/mammoth.browser.min.js"></script>
<script type="module">
  const SUPABASE_URL = 'https://ipflegbroqefhbucbnrv.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_iXkEAv5hsTgtaqSuza7maA_E17o44dl';
  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  const { data: { session } } = await sb.auth.getSession();
  if (!session) { window.location.href = 'login.html'; }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  function esc(s) {
    return (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  function renderUserCard(t) {
    const snippet = t.content.trim().slice(0, 120) + (t.content.trim().length > 120 ? '…' : '');
    return `
      <div class="trame-card" id="card-${t.id}">
        <div class="trame-card-head">
          <div class="trame-nom">${esc(t.name)}</div>
        </div>
        <div class="trame-desc">${esc(snippet)}</div>
        <div class="trame-actions">
          <a href="trames-edit.html?id=${t.id}" class="btn-trame">Modifier</a>
          <button class="btn-trame" data-preview="${t.id}">Aperçu</button>
          <button class="btn-trame btn-trame-danger" data-delete="${t.id}">Supprimer</button>
        </div>
        <pre class="trame-preview" id="preview-${t.id}">${esc(t.content)}</pre>
      </div>`;
  }

  const grid = document.getElementById('trames-grid');

  grid.addEventListener('click', async (e) => {
    const previewBtn = e.target.closest('[data-preview]');
    if (previewBtn) {
      const pre   = document.getElementById('preview-' + previewBtn.dataset.preview);
      const isOpen = pre.classList.toggle('open');
      previewBtn.textContent = isOpen ? 'Masquer' : 'Aperçu';
      return;
    }
    const deleteBtn = e.target.closest('[data-delete]');
    if (deleteBtn) {
      if (!confirm('Supprimer définitivement cette trame ? Cette action est irréversible.')) return;
      const id = deleteBtn.dataset.delete;
      const { error } = await sb.from('trames').delete().eq('id', id);
      if (error) { showToast('Erreur : ' + error.message); return; }
      document.getElementById('card-' + id)?.remove();
      showToast('Trame supprimée.');
    }
  });

  document.getElementById('import-input').addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    e.target.value = '';
    if (!window.mammoth) { showToast('Mammoth non chargé, réessayez dans un instant.'); return; }
    try {
      showToast('Extraction du fichier…');
      const buf    = await file.arrayBuffer();
      const result = await window.mammoth.extractRawText({ arrayBuffer: buf });
      const name   = file.name.replace(/\.docx$/i, '').replace(/[-_]+/g, ' ');
      sessionStorage.setItem('florita-trame-import', JSON.stringify({ name, content: result.value }));
      window.location.href = 'trames-edit.html';
    } catch (err) {
      showToast("Erreur lors de l'extraction : " + err.message);
    }
  });

  const { data, error } = await sb.from('trames').select('id, name, content, created_at').order('created_at', { ascending: true });

  if (error) {
    grid.innerHTML = `<div class="grid-loading">Impossible de charger les trames : ${esc(error.message)}</div>`;
  } else if (data && data.length) {
    grid.innerHTML = data.map(renderUserCard).join('');
  } else {
    grid.innerHTML = `<div class="grid-loading">Vous n'avez pas encore de trame.<br><br>Si vous avez déjà un modèle Word, commencez par l'importer avec le bouton ci-dessus.<br><br>Vous pourrez aussi créer une trame directement dans Florita.</div>`;
  }
</script>
</body>
</html>
