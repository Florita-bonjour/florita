<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mes trames — Florita</title>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #FAFAF8; --violet: #6B4C9A; --violet-dark: #5A3D87;
      --rose: #D4537E; --text: #2C2C2A; --grey: #637080;
      --border: #D0D7DE; --border-light: #E8E4F0;
    }
    body { font-family: 'Quicksand', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    .layout { display: flex; min-height: 100vh; }

    .sidebar {
      width: 240px; flex-shrink: 0;
      background: linear-gradient(160deg, #6B4C9A 0%, #D4537E 100%);
      color: #fff; padding: 1.8rem 1.2rem;
      display: flex; flex-direction: column;
      position: sticky; top: 0; height: 100vh;
    }
    .sidebar-logo { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 2.4rem; text-decoration: none; }
    .sidebar-logo .name { font-size: 1.6rem; font-weight: 700; color: #fff; }
    .sidebar-logo .name span { color: #F5C542; }
    .sidebar-logo svg { transform: translateY(-1px); }
    .nav { display: flex; flex-direction: column; gap: 4px; }
    .nav a {
      display: flex; align-items: center; gap: 10px;
      padding: 0.7rem 0.85rem; border-radius: 8px;
      color: rgba(255,255,255,0.82); text-decoration: none;
      font-size: 0.92rem; font-weight: 600; transition: background 0.15s, color 0.15s;
    }
    .nav a:hover { background: rgba(255,255,255,0.12); color: #fff; }
    .nav a.active { background: rgba(255,255,255,0.18); color: #fff; }
    .nav a svg { flex-shrink: 0; }
    .sidebar-bottom { margin-top: auto; }
    .logout-btn {
      width: 100%; display: flex; align-items: center; gap: 10px;
      padding: 0.7rem 0.85rem; border-radius: 8px;
      background: rgba(255,255,255,0.10); border: 1px solid rgba(255,255,255,0.16);
      color: #fff; font-family: inherit; font-size: 0.9rem; font-weight: 600;
      cursor: pointer; transition: background 0.15s;
    }
    .logout-btn:hover { background: rgba(255,255,255,0.2); }
    .sidebar-sep { height: 1px; background: rgba(255,255,255,0.18); margin: 4px 0.85rem; }
    .sidebar-aide { display: flex; align-items: center; gap: 10px; padding: 0.7rem 0.85rem; border-radius: 8px; color: rgba(255,255,255,0.82); text-decoration: none; font-size: 0.92rem; font-weight: 600; transition: background 0.15s, color 0.15s; }
    .sidebar-aide:hover { background: rgba(255,255,255,0.12); color: #fff; }
    .sidebar-aide.active { background: rgba(255,255,255,0.18); color: #fff; }

    .main { flex: 1; padding: 2.6rem 3rem; max-width: 1100px; }

    .page-head {
      display: flex; align-items: flex-start; justify-content: space-between;
      gap: 1rem; margin-bottom: 2rem; flex-wrap: wrap;
    }
    .page-head h1 { font-size: 1.9rem; font-weight: 700; color: var(--text); }
    .page-head p { color: var(--grey); font-size: 0.95rem; margin-top: 0.35rem; }
    .page-actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; padding-top: 0.3rem; }

    .btn-action {
      display: inline-flex; align-items: center; gap: 6px;
      font-family: inherit; font-size: 0.85rem; font-weight: 700;
      padding: 0.5rem 1rem; border-radius: 7px; cursor: pointer;
      border: 1px solid var(--border); background: #fff; color: var(--text);
      text-decoration: none; transition: border-color 0.12s, color 0.12s;
      white-space: nowrap;
    }
    .btn-action:hover { border-color: var(--violet); color: var(--violet); }
    .btn-primary {
      background: linear-gradient(135deg, #D4537E 0%, #6B4C9A 100%);
      color: #fff; border-color: transparent;
    }
    .btn-primary:hover { opacity: 0.88; color: #fff; border-color: transparent; }

    .trames-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 18px;
    }

    .trame-card {
      background: #fff; border: 1px solid var(--border-light); border-radius: 14px;
      padding: 1.4rem 1.5rem;
      display: flex; flex-direction: column; gap: 0.7rem;
      transition: box-shadow 0.15s, transform 0.15s;
    }
    .trame-card:hover { box-shadow: 0 6px 22px rgba(107,76,154,0.10); transform: translateY(-1px); }

    .trame-card-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 0.5rem; }
    .trame-nom { font-size: 1rem; font-weight: 700; color: var(--text); line-height: 1.3; }

    .trame-desc { font-size: 0.86rem; color: var(--grey); line-height: 1.5; }

    .trame-actions { display: flex; gap: 8px; margin-top: 0.3rem; flex-wrap: wrap; }
    .btn-trame {
      font-family: inherit; font-size: 0.82rem; font-weight: 700;
      padding: 0.4rem 0.9rem; border-radius: 6px; cursor: pointer;
      border: 1px solid var(--border); background: #fff; color: var(--text);
      text-decoration: none; transition: border-color 0.12s, color 0.12s;
    }
    .btn-trame:hover { border-color: var(--violet); color: var(--violet); }
    .btn-trame-danger { color: #D94F4F; border-color: #F0D5D5; }
    .btn-trame-danger:hover { background: #FFF0F0; border-color: #D94F4F; }

    .trame-preview {
      display: none;
      margin-top: 0.5rem;
      padding: 0.7rem 0.9rem;
      background: #f8f7fc;
      border: 1px solid var(--border-light);
      border-radius: 8px;
      font-size: 0.76rem;
      font-family: 'Courier New', monospace;
      white-space: pre-wrap;
      color: var(--grey);
      max-height: 260px;
      overflow-y: auto;
      line-height: 1.5;
    }
    .trame-preview.open { display: block; }

    .grid-loading { grid-column: 1 / -1; text-align: center; padding: 3rem 1rem; color: var(--grey); }
    .spinner {
      width: 30px; height: 30px; margin: 0 auto 0.8rem;
      border: 3px solid var(--border-light); border-top-color: var(--violet);
      border-radius: 50%; animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .toast {
      position: fixed; bottom: 2rem; right: 2rem;
      background: var(--violet); color: #fff;
      padding: 0.75rem 1.3rem; border-radius: 10px;
      font-size: 0.88rem; font-weight: 600;
      box-shadow: 0 4px 16px rgba(107,76,154,0.3);
      opacity: 0; transform: translateY(8px);
      transition: opacity 0.25s, transform 0.25s;
      pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateY(0); }

    @media (max-width: 820px) {
      .layout { flex-direction: column; }
      .sidebar { width: 100%; height: auto; position: static; flex-direction: row; align-items: center; padding: 1rem 1.2rem; gap: 1rem; }
      .sidebar-logo { margin-bottom: 0; }
      .nav { flex-direction: row; flex: 1; justify-content: center; gap: 2px; }
      .nav a span { display: none; }
      .sidebar-bottom { margin-top: 0; margin-left: auto; display: flex; align-items: center; gap: 4px; }
      .logout-btn span { display: none; }
      .sidebar-aide span { display: none; }
      .sidebar-sep { display: none; }
      .main { padding: 1.5rem 1.2rem; }
      .trames-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div class="layout">

  <aside class="sidebar">
    <a href="dashboard.html" class="sidebar-logo">
      <svg width="40" height="25" viewBox="0 0 48 30" aria-hidden="true">
        <path d="M2,28 A22,22 0 0,1 46,28" fill="none" stroke="rgba(255,255,255,0.95)" stroke-width="3.5" stroke-linecap="round"/>
        <path d="M7,28 A17,17 0 0,1 41,28" fill="none" stroke="rgba(255,255,255,0.75)" stroke-width="3.5" stroke-linecap="round"/>
        <path d="M12,28 A12,12 0 0,1 36,28" fill="none" stroke="rgba(255,255,255,0.55)" stroke-width="3" stroke-linecap="round"/>
        <path d="M17,28 A7,7 0 0,1 31,28" fill="none" stroke="rgba(255,255,255,0.38)" stroke-width="3" stroke-linecap="round"/>
        <path d="M22,28 A2,2 0 0,1 26,28" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="2.5" stroke-linecap="round"/>
      </svg>
      <div class="name">florita<span>.</span></div>
    </a>
    <nav class="nav">
      <a href="dashboard.html">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        <span>Tableau de bord</span>
      </a>
      <a href="formulaire.html">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        <span>Nouveau CR</span>
      </a>
      <a href="historique.html">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15 14"/></svg>
        <span>Historique</span>
      </a>
      <a href="trames.html" class="active">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        <span>Mes trames</span>
      </a>
      <a href="profil.html">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        <span>Profil</span>
      </a>
    </nav>
    <div class="sidebar-bottom">
      <div class="sidebar-sep"></div>
      <a href="aide.html" class="sidebar-aide">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
        <span>Aide</span>
      </a>
      <button class="logout-btn" id="logout">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        <span>Déconnexion</span>
      </button>
    </div>
  </aside>

  <main class="main">
    <div class="page-head">
      <div>
        <h1>Mes trames</h1>
        <p>Gérez vos modèles de comptes rendus.</p>
      </div>
      <div class="page-actions">
        <label class="btn-action btn-primary" id="import-zone">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          Importer un .docx
          <input type="file" id="import-input" accept=".docx" style="display:none" />
        </label>
        <a href="trames-edit.html" class="btn-action">+ Nouvelle trame</a>
      </div>
    </div>

    <div class="trames-grid" id="trames-grid">
      <div class="grid-loading"><div class="spinner"></div>Chargement…</div>
    </div>
  </main>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://unpkg.com/mammoth/mammoth.browser.min.js"></script>
<script type="module">
  const SUPABASE_URL = 'https://ipflegbroqefhbucbnrv.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_iXkEAv5hsTgtaqSuza7maA_E17o44dl';
  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  const { data: { session } } = await sb.auth.getSession();
  if (!session) { window.location.href = 'login.html'; }

  document.getElementById('logout').addEventListener('click', async () => {
    await sb.auth.signOut();
    window.location.href = 'login.html';
  });

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  function esc(s) {
    return (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  function renderUserCard(t) {
    const snippet = t.content.trim().slice(0, 120) + (t.content.trim().length > 120 ? '…' : '');
    return `
      <div class="trame-card" id="card-${t.id}">
        <div class="trame-card-head">
          <div class="trame-nom">${esc(t.name)}</div>
        </div>
        <div class="trame-desc">${esc(snippet)}</div>
        <div class="trame-actions">
          <a href="trames-edit.html?id=${t.id}" class="btn-trame">Modifier</a>
          <button class="btn-trame" data-preview="${t.id}">Aperçu</button>
          <button class="btn-trame btn-trame-danger" data-delete="${t.id}">Supprimer</button>
        </div>
        <pre class="trame-preview" id="preview-${t.id}">${esc(t.content)}</pre>
      </div>`;
  }

  const grid = document.getElementById('trames-grid');

  grid.addEventListener('click', async (e) => {
    const previewBtn = e.target.closest('[data-preview]');
    if (previewBtn) {
      const pre   = document.getElementById('preview-' + previewBtn.dataset.preview);
      const isOpen = pre.classList.toggle('open');
      previewBtn.textContent = isOpen ? 'Masquer' : 'Aperçu';
      return;
    }
    const deleteBtn = e.target.closest('[data-delete]');
    if (deleteBtn) {
      if (!confirm('Supprimer définitivement cette trame ? Cette action est irréversible.')) return;
      const id = deleteBtn.dataset.delete;
      const { error } = await sb.from('trames').delete().eq('id', id);
      if (error) { showToast('Erreur : ' + error.message); return; }
      document.getElementById('card-' + id)?.remove();
      showToast('Trame supprimée.');
    }
  });

  document.getElementById('import-input').addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    e.target.value = '';
    if (!window.mammoth) { showToast('Mammoth non chargé, réessayez dans un instant.'); return; }
    try {
      showToast('Extraction du fichier…');
      const buf    = await file.arrayBuffer();
      const result = await window.mammoth.extractRawText({ arrayBuffer: buf });
      const name   = file.name.replace(/\.docx$/i, '').replace(/[-_]+/g, ' ');
      sessionStorage.setItem('florita-trame-import', JSON.stringify({ name, content: result.value }));
      window.location.href = 'trames-edit.html';
    } catch (err) {
      showToast("Erreur lors de l'extraction : " + err.message);
    }
  });

  const { data, error } = await sb.from('trames').select('id, name, content, created_at').order('created_at', { ascending: true });

  if (error) {
    grid.innerHTML = `<div class="grid-loading">Impossible de charger les trames : ${esc(error.message)}</div>`;
  } else if (data && data.length) {
    grid.innerHTML = data.map(renderUserCard).join('');
  } else {
    grid.innerHTML = `<div class="grid-loading">Vous n'avez pas encore de trame. Si vous avez déjà un modèle Word, commencez par l'importer avec le bouton ci-dessus. Vous pourrez aussi créer une trame directement dans Florita.</div>`;
  }
</script>
</body>
</html>
