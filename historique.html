<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Historique â€” Florita</title>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #FAFAF8;
      --violet: #6B4C9A;
      --violet-dark: #5A3D87;
      --rose: #D4537E;
      --text: #2C2C2A;
      --grey: #637080;
      --border: #D0D7DE;
      --border-light: #E8E4F0;
    }
    body { font-family: 'Quicksand', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    .layout { display: flex; min-height: 100vh; }

    /* Sidebar */
    .sidebar {
      width: 240px; flex-shrink: 0;
      background: linear-gradient(160deg, #6B4C9A 0%, #D4537E 100%);
      color: #fff; padding: 1.8rem 1.2rem;
      display: flex; flex-direction: column;
      position: sticky; top: 0; height: 100vh;
    }
    .sidebar-logo { display: flex; align-items: center; gap: 10px; margin-bottom: 2.4rem; text-decoration: none; }
    .sidebar-logo .name { font-size: 1.6rem; font-weight: 700; color: #fff; }
    .sidebar-logo .name span { color: #F5C542; }
    .nav { display: flex; flex-direction: column; gap: 4px; }
    .nav a {
      display: flex; align-items: center; gap: 10px;
      padding: 0.7rem 0.85rem; border-radius: 8px;
      color: rgba(255,255,255,0.82); text-decoration: none;
      font-size: 0.92rem; font-weight: 600; transition: background 0.15s, color 0.15s;
    }
    .nav a:hover { background: rgba(255,255,255,0.12); color: #fff; }
    .nav a.active { background: rgba(255,255,255,0.18); color: #fff; }
    .nav a svg { flex-shrink: 0; }
    .sidebar-bottom { margin-top: auto; }
    .logout-btn {
      width: 100%; display: flex; align-items: center; gap: 10px;
      padding: 0.7rem 0.85rem; border-radius: 8px;
      background: rgba(255,255,255,0.10); border: 1px solid rgba(255,255,255,0.16);
      color: #fff; font-family: inherit; font-size: 0.9rem; font-weight: 600;
      cursor: pointer; transition: background 0.15s;
    }
    .logout-btn:hover { background: rgba(255,255,255,0.2); }

    /* Zone principale */
    .main { flex: 1; padding: 2.6rem 3rem; max-width: 920px; }
    .page-head { margin-bottom: 2rem; }
    .page-head h1 { font-size: 1.9rem; font-weight: 700; color: var(--text); }
    .page-head p { color: var(--grey); font-size: 0.95rem; margin-top: 0.35rem; }

    /* Liste */
    .cr-list { display: flex; flex-direction: column; gap: 14px; }
    .cr-card {
      background: #fff; border: 1px solid var(--border-light); border-radius: 12px;
      padding: 1.2rem 1.4rem; transition: box-shadow 0.15s, transform 0.15s;
    }
    .cr-card:hover { box-shadow: 0 6px 22px rgba(107,76,154,0.10); transform: translateY(-1px); }
    .cr-card-top { display: flex; align-items: center; justify-content: space-between; gap: 1rem; flex-wrap: wrap; }
    .cr-meta { display: flex; align-items: baseline; gap: 12px; flex-wrap: wrap; }
    .cr-date { font-size: 1.05rem; font-weight: 700; color: var(--text); }
    .cr-ville { font-size: 0.95rem; font-weight: 600; color: var(--grey); }
    .cr-badge {
      font-size: 0.74rem; font-weight: 700; letter-spacing: 0.02em;
      padding: 4px 11px; border-radius: 14px;
      background: #F3EEF9; color: var(--violet); white-space: nowrap;
    }
    .cr-snippet { color: var(--grey); font-size: 0.9rem; line-height: 1.6; margin: 0.75rem 0 1rem; }
    .cr-actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .btn {
      font-family: inherit; font-size: 0.85rem; font-weight: 700;
      padding: 0.5rem 0.9rem; border-radius: 7px; cursor: pointer;
      border: 1px solid transparent; transition: all 0.15s;
      display: inline-flex; align-items: center; gap: 6px;
    }
    .btn-word {
      background: linear-gradient(135deg, #D4537E 0%, #6B4C9A 100%);
      color: #fff; border: none;
    }
    .btn-word:hover { opacity: 0.88; }
    .btn-ghost { background: #fff; color: var(--violet); border-color: var(--border); }
    .btn-ghost:hover { border-color: var(--violet); }
    .btn-danger { background: #fff; color: #D94F4F; border-color: #F0D5D5; }
    .btn-danger:hover { background: #FFF0F0; border-color: #D94F4F; }

    .cr-preview {
      display: none; margin-top: 1rem; padding-top: 1rem;
      border-top: 1px dashed var(--border); font-size: 0.9rem; line-height: 1.7;
    }
    .cr-preview.open { display: block; }
    .cr-preview h3 { font-size: 1rem; color: var(--violet); margin: 0.9rem 0 0.3rem; }
    .cr-preview p { margin-bottom: 0.6rem; }
    .cr-preview mark.hl { background: #FFF3B0; padding: 0 2px; }
    .cr-preview hr { border: none; border-top: 1px solid var(--border); margin: 0.8rem 0; }

    .state { text-align: center; padding: 4rem 1rem; color: var(--grey); }
    .state-empty .empty-logo { margin: 0 auto 1.4rem; }
    .state-empty h2 { color: var(--text); font-size: 1.3rem; margin-bottom: 0.5rem; }
    .state-empty p { margin-bottom: 1.6rem; }
    .cta {
      display: inline-block;
      background: linear-gradient(135deg, #D4537E 0%, #6B4C9A 100%);
      color: #fff; text-decoration: none;
      padding: 0.75rem 1.5rem; border-radius: 8px; font-weight: 700; font-size: 0.95rem;
      transition: opacity 0.15s;
    }
    .cta:hover { opacity: 0.88; }
    .spinner {
      width: 34px; height: 34px; margin: 0 auto 1rem;
      border: 3px solid var(--border-light); border-top-color: var(--violet);
      border-radius: 50%; animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 820px) {
      .layout { flex-direction: column; }
      .sidebar { width: 100%; height: auto; position: static; flex-direction: row; align-items: center; padding: 1rem 1.2rem; gap: 1rem; }
      .sidebar-logo { margin-bottom: 0; }
      .nav { flex-direction: row; flex: 1; justify-content: center; gap: 2px; }
      .nav a span { display: none; }
      .sidebar-bottom { margin-top: 0; margin-left: auto; }
      .logout-btn span { display: none; }
      .main { padding: 1.8rem 1.3rem; }
    }
  </style>
</head>
<body>

          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15 14"/></svg>

          <span>DÃ©connexion</span>
        </button>

    <main class="main">
      <div class="page-head">
        <h1>Historique des comptes rendus</h1>
        <p>Retrouvez, retÃ©lÃ©chargez ou supprimez vos comptes rendus gÃ©nÃ©rÃ©s.</p>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://unpkg.com/docx@8.5.0/build/index.umd.js"></script>
  <script>
    const SUPABASE_URL = 'https://ipflegbroqefhbucbnrv.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_iXkEAv5hsTgtaqSuza7maA_E17o44dl';
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    document.getElementById('logout').addEventListener('click', function () {
      sb.auth.signOut().then(function () { window.location.href = 'login.html'; });
    });

    function esc(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    function inline(text) {
      return text.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/==(.+?)==/g,'<mark class="hl">$1</mark>');
    }
    function mdToHTML(text) {
      const lines = text.split('\n'); const html = []; let para = [];
      const flushPara = () => { if (!para.length) return; html.push('<p>' + inline(esc(para.join('\n')).replace(/\n/g,'<br>')) + '</p>'); para = []; };
      for (const raw of lines) {
        const line = raw.trimEnd();
        if (line.trim() === '---') { flushPara(); html.push('<hr>'); }
        else if (/^## /.test(line)) { flushPara(); html.push('<h3>' + inline(esc(line.replace(/^## /,''))) + '</h3>'); }
        else if (line.trim() === '') { flushPara(); }
        else { para.push(line); }
      }
      flushPara(); return html.join('');
    }
    function plainPreview(md) {
      return (md||'').replace(/^##\s+/gm,'').replace(/^---$/gm,'').replace(/\*\*/g,'').replace(/==/g,'').replace(/\s+/g,' ').trim().slice(0,180)+'â€¦';
    }
    function frDate(iso) {
      try { return new Date(iso).toLocaleDateString('fr-FR',{day:'numeric',month:'long',year:'numeric'}); } catch(_) { return iso||''; }
    }
    function displayDate(cr) {
      if (cr.date_vad) { const p=cr.date_vad.split('-'); if(p.length===3) return p[2]+'/'+p[1]+'/'+p[0]; return cr.date_vad; }
      return frDate(cr.created_at);
    }

    async function exportWord(cr) {
      const { Document, Paragraph, TextRun, Packer } = window.docx;
      const date = frDate(cr.created_at);
      const children = [
        new Paragraph({children:[new TextRun({text:"Cabinet d'ErgothÃ©rapie",bold:true,size:24})]}),
        new Paragraph({children:[new TextRun({text:date,color:'637080',size:18})]}),
        new Paragraph({children:[new TextRun({text:''})]}),
        new Paragraph({children:[new TextRun({text:'Patient : '})]}),
        new Paragraph({children:[new TextRun({text:'Date de naissance : '})]}),
        new Paragraph({children:[new TextRun({text:'ThÃ©rapeute : '})]}),
        new Paragraph({children:[new TextRun({text:''})]}),
        new Paragraph({children:[new TextRun({text:"COMPTE RENDU D'Ã‰VALUATION ERGOTHÃ‰RAPIQUE",bold:true,size:22})]}),
        new Paragraph({children:[],border:{bottom:{style:'single',size:6,color:'D0D7DE',space:1}},spacing:{after:160}}),
      ];
      const container = document.createElement('div');
      container.innerHTML = mdToHTML(cr.generated_text||'');
      for (const node of container.childNodes) {
        if (node.nodeType!==Node.ELEMENT_NODE) continue;
        if (node.tagName==='H3') { children.push(new Paragraph({children:[new TextRun({text:node.textContent,bold:true,size:20})],spacing:{before:240,after:80}})); }
        else if (node.tagName==='HR') { children.push(new Paragraph({children:[],border:{bottom:{style:'single',size:4,color:'D0D7DE',space:1}},spacing:{before:80,after:80}})); }
        else if (node.tagName==='P') {
          const runs=[];
          for (const child of node.childNodes) {
            if (child.nodeType===Node.TEXT_NODE&&child.textContent) runs.push(new TextRun({text:child.textContent}));
            else if (child.tagName==='STRONG') runs.push(new TextRun({text:child.textContent,bold:true}));
            else if (child.tagName==='MARK') runs.push(new TextRun({text:child.textContent,highlight:'yellow'}));
            else if (child.tagName==='BR') runs.push(new TextRun({break:1}));
          }
          if (runs.length) children.push(new Paragraph({children:runs,spacing:{after:120}}));
        }
      }
      const doc = new Document({styles:{default:{document:{run:{font:'Calibri',size:22},paragraph:{alignment:'both'}}}},sections:[{children}]});
      const blob = await Packer.toBlob(doc);
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a'); a.href=url;
      a.download=(cr.date_vad&&cr.ville)?(cr.date_vad+'-'+cr.ville+'.docx'):'compte-rendu-ergotherapie.docx';
      a.click(); URL.revokeObjectURL(url);
    }

    async function deleteCR(id, cardEl) {
      if (!confirm('Supprimer dÃ©finitivement ce compte rendu ? Cette action est irrÃ©versible.')) return;
      const {error} = await sb.from('generated_crs').delete().eq('id',id);
      if (error) { alert("La suppression a Ã©chouÃ© : "+error.message); return; }
      cardEl.remove();
      if (!document.querySelector('.cr-card')) renderEmpty();
    }

    const content = document.getElementById('content');

    function renderEmpty() {
      content.innerHTML='<div class="state state-empty">'+
        '<svg class="empty-logo" width="72" height="45" viewBox="0 0 48 30">'+
          '<path d="M2,28 A22,22 0 0,1 46,28" fill="none" stroke="#D4537E" stroke-width="3.5" stroke-linecap="round"/>'+
          '<path d="M7,28 A17,17 0 0,1 41,28" fill="none" stroke="#C14F88" stroke-width="3.5" stroke-linecap="round"/>'+
          '<path d="M12,28 A12,12 0 0,1 36,28" fill="none" stroke="#A04D92" stroke-width="3" stroke-linecap="round"/>'+
          '<path d="M17,28 A7,7 0 0,1 31,28" fill="none" stroke="#864A98" stroke-width="3" stroke-linecap="round"/>'+
          '<path d="M22,28 A2,2 0 0,1 26,28" fill="none" stroke="#6B4C9A" stroke-width="2.5" stroke-linecap="round"/>'+
        '</svg>'+
        '<h2>Aucun compte rendu pour l\'instant</h2>'+
        '<p>Vos comptes rendus gÃ©nÃ©rÃ©s apparaÃ®tront ici.</p>'+
        '<a class="cta" href="formulaire.html">CrÃ©er mon premier CR</a>'+
      '</div>';
    }

    function renderList(crs) {
      const list = document.createElement('div'); list.className='cr-list';
      crs.forEach(function(cr) {
        const card = document.createElement('div'); card.className='cr-card';
        const dest = cr.destination ? esc(cr.destination) : 'â€”';
        const top='<div class="cr-card-top"><div class="cr-meta"><span class="cr-date">'+displayDate(cr)+'</span>'+(cr.ville?'<span class="cr-ville">'+esc(cr.ville)+'</span>':'')+'</div><span class="cr-badge">'+dest+'</span></div>';
        const snippet='<div class="cr-snippet">'+esc(plainPreview(cr.generated_text))+'</div>';
        const actions='<div class="cr-actions">'+
          '<button class="btn btn-word" data-act="word"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>TÃ©lÃ©charger le Word</button>'+
          '<button class="btn btn-ghost" data-act="preview">AperÃ§u</button>'+
          '<button class="btn btn-danger" data-act="delete">Supprimer</button>'+
        '</div>';
        const preview='<div class="cr-preview">'+mdToHTML(cr.generated_text||'')+'</div>';
        card.innerHTML=top+snippet+actions+preview;
        card.querySelector('[data-act="word"]').addEventListener('click',function(){exportWord(cr);});
        card.querySelector('[data-act="preview"]').addEventListener('click',function(e){
          const pv=card.querySelector('.cr-preview'); pv.classList.toggle('open');
          e.target.textContent=pv.classList.contains('open')?'Masquer':'AperÃ§u';
        });
        card.querySelector('[data-act="delete"]').addEventListener('click',function(){deleteCR(cr.id,card);});
        list.appendChild(card);
      });
      content.innerHTML=''; content.appendChild(list);
    }

    (async function init() {
      const {data:{session}} = await sb.auth.getSession();
      if (!session) { window.location.href='login.html'; return; }
      const {data,error} = await sb.from('generated_crs')
        .select('id, destination, trame_key, sexe, date_vad, ville, notes, measures, generated_text, created_at')
        .order('created_at',{ascending:false});
      if (error) { content.innerHTML='<div class="state">Impossible de charger l\'historique : '+esc(error.message)+'</div>'; return; }
      if (!data||!data.length) { renderEmpty(); return; }
      renderList(data);
    })();
  </script>
