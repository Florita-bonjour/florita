<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Compte Rendu — Ergothérapie</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .topbar-nav { display: flex; gap: 0.25rem; }
    .nav-link {
      padding: 0.35rem 0.85rem;
      border-radius: 5px;
      font-size: 0.88rem;
      font-weight: 500;
      color: var(--muted);
      text-decoration: none;
      transition: background 0.12s, color 0.12s;
    }
    .nav-link:hover  { background: #f0f4f8; color: var(--text); }
    .nav-link.active { background: #e8f0f8; color: var(--accent); }
  </style>
</head>
<body>
  <div class="layout">

    <header class="topbar">
      <div class="brand">
        <svg class="brand-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
        </svg>
        <span class="brand-name">Florita</span>
      </div>
      <nav class="topbar-nav">
        <a href="formulaire.html" class="nav-link">Formulaire</a>
        <a href="index.html" class="nav-link active">Compte rendu</a>
<a href="#" class="nav-link" id="btn-logout" style="color:#D94F4F;">Déconnexion</a>
      </nav>
      <button id="btn-word" class="btn-word" aria-label="Télécharger le compte rendu en Word">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="16" y1="13" x2="8" y2="13"/>
          <line x1="16" y1="17" x2="8" y2="17"/>
        </svg>
        <span>Télécharger en Word</span>
      </button>
    </header>

    <main class="workspace">
      <div class="document">

        <div class="doc-meta">
          <div class="practice">
            <div class="practice-name">Cabinet d'Ergothérapie</div>
            <div class="practice-address">12 rue des Lilas — 75000 Paris</div>
          </div>
          <div id="doc-date" class="doc-date"></div>
        </div>

        <div class="separator"></div>

        <div class="patient-block">
          <div class="patient-row">
            <span class="field-label">Patient</span>
            <span class="field-value" id="field-patient" contenteditable="true" spellcheck="false">—</span>
          </div>
          <div class="patient-row">
            <span class="field-label">Date de naissance</span>
            <span class="field-value" id="field-dob" contenteditable="true" spellcheck="false">—</span>
          </div>
          <div class="patient-row">
            <span class="field-label">Thérapeute</span>
            <span class="field-value" id="field-therapist" contenteditable="true" spellcheck="false">—</span>
          </div>
        </div>

        <h2 class="doc-title">Compte Rendu d'Évaluation Ergothérapique</h2>

        <div id="cr-editor" class="cr-editor" contenteditable="true" spellcheck="true"></div>

        <div class="doc-footer">
          <p class="signature-label">Signature du thérapeute</p>
          <div class="signature-line"></div>
        </div>

      </div>
    </main>

  </div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="auth.js"></script>
  <script>
    document.getElementById('btn-logout').addEventListener('click', async () => {
      const sb = window.supabase.createClient('https://ipflegbroqefhbucbnrv.supabase.co', 'sb_publishable_iXkEAv5hsTgtaqSuza7maA_E17o44dl');
      await sb.auth.signOut();
      window.location.href = 'login.html';
    });
  </script>
  <script src="https://unpkg.com/docx@8.5.0/build/index.umd.js"></script>
  <script type="module" src="script.js"></script>
</body>
</html>
