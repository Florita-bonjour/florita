<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Compte Rendu — Florita</title>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Quicksand', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    .layout { display: flex; min-height: 100vh; }

    .sidebar {
      width: 240px; flex-shrink: 0;
      background: linear-gradient(160deg, #6B4C9A 0%, #D4537E 100%);
      color: #fff; padding: 1.8rem 1.2rem;
      display: flex; flex-direction: column;
      position: sticky; top: 0; height: 100vh;
    }
    .sidebar-logo { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 2.4rem; text-decoration: none; }
    .sidebar-logo .name { font-size: 1.6rem; font-weight: 700; color: #fff; }
    .sidebar-logo .name span { color: #F5C542; }
    .nav { display: flex; flex-direction: column; gap: 4px; }
    .nav a {
      display: flex; align-items: center; gap: 10px;
      padding: 0.7rem 0.85rem; border-radius: 8px;
      color: rgba(255,255,255,0.82); text-decoration: none;
      font-size: 0.92rem; font-weight: 600; transition: background 0.15s, color 0.15s;
    }
    .nav a:hover { background: rgba(255,255,255,0.12); color: #fff; }
    .nav a.active { background: rgba(255,255,255,0.18); color: #fff; }
    .nav a svg { flex-shrink: 0; }
    .sidebar-bottom { margin-top: auto; }
    .logout-btn {
      width: 100%; display: flex; align-items: center; gap: 10px;
      padding: 0.7rem 0.85rem; border-radius: 8px;
      background: rgba(255,255,255,0.10); border: 1px solid rgba(255,255,255,0.16);
      color: #fff; font-family: inherit; font-size: 0.9rem; font-weight: 600;
      cursor: pointer; transition: background 0.15s;
    }
    .logout-btn:hover { background: rgba(255,255,255,0.2); }

    .main { flex: 1; padding: 2.6rem 3rem; }

    .page-head {
      display: flex; align-items: center; justify-content: flex-end;
      margin-bottom: 2rem;
    }

    @media (max-width: 820px) {
      .layout { flex-direction: column; }
      .sidebar { width: 100%; height: auto; position: static; flex-direction: row; align-items: center; padding: 1rem 1.2rem; gap: 1rem; }
      .sidebar-logo { margin-bottom: 0; }
      .nav { flex-direction: row; flex: 1; justify-content: center; gap: 2px; }
      .nav a span { display: none; }
      .sidebar-bottom { margin-top: 0; margin-left: auto; }
      .logout-btn span { display: none; }
      .main { padding: 1.5rem 1.2rem; }
    }
  </style>
</head>
<body>
<div class="layout">

  <aside class="sidebar">
    <a href="dashboard.html" class="sidebar-logo">
      <svg width="40" height="25" viewBox="0 0 48 30" aria-hidden="true">
        <path d="M2,28 A22,22 0 0,1 46,28" fill="none" stroke="rgba(255,255,255,0.95)" stroke-width="3.5" stroke-linecap="round"/>
        <path d="M7,28 A17,17 0 0,1 41,28" fill="none" stroke="rgba(255,255,255,0.75)" stroke-width="3.5" stroke-linecap="round"/>
        <path d="M12,28 A12,12 0 0,1 36,28" fill="none" stroke="rgba(255,255,255,0.55)" stroke-width="3" stroke-linecap="round"/>
        <path d="M17,28 A7,7 0 0,1 31,28" fill="none" stroke="rgba(255,255,255,0.38)" stroke-width="3" stroke-linecap="round"/>
        <path d="M22,28 A2,2 0 0,1 26,28" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="2.5" stroke-linecap="round"/>
      </svg>
      <div class="name">florita<span>.</span></div>
    </a>
    <nav class="nav">
      <a href="dashboard.html">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        <span>Tableau de bord</span>
      </a>
      <a href="formulaire.html" class="active">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        <span>Nouveau CR</span>
      </a>
      <a href="historique.html">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15 14"/></svg>
        <span>Historique</span>
      </a>
      <a href="trames.html">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        <span>Mes trames</span>
      </a>
      <a href="profil.html">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        <span>Profil</span>
      </a>
    </nav>
    <div class="sidebar-bottom">
      <button class="logout-btn" id="logout">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        <span>Déconnexion</span>
      </button>
    </div>
  </aside>

  <div class="main">
    <div class="page-head">
      <button id="btn-word" class="btn-word" aria-label="Télécharger le compte rendu en Word">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="16" y1="13" x2="8" y2="13"/>
          <line x1="16" y1="17" x2="8" y2="17"/>
        </svg>
        <span>Télécharger en Word</span>
      </button>
    </div>

    <main class="workspace" style="padding-top: 0;">
      <div class="document">

        <div class="doc-meta">
          <div class="practice">
            <div class="practice-name">Cabinet d'Ergothérapie</div>
            <div class="practice-address">12 rue des Lilas — 75000 Paris</div>
          </div>
          <div id="doc-date" class="doc-date"></div>
        </div>

        <div class="separator"></div>

        <div class="patient-block">
          <div class="patient-row">
            <span class="field-label">Patient</span>
            <span class="field-value" id="field-patient" contenteditable="true" spellcheck="false">—</span>
          </div>
          <div class="patient-row">
            <span class="field-label">Date de naissance</span>
            <span class="field-value" id="field-dob" contenteditable="true" spellcheck="false">—</span>
          </div>
          <div class="patient-row">
            <span class="field-label">Thérapeute</span>
            <span class="field-value" id="field-therapist" contenteditable="true" spellcheck="false">—</span>
          </div>
        </div>

        <h2 class="doc-title">Compte Rendu d'Évaluation Ergothérapique</h2>

        <div id="cr-editor" class="cr-editor" contenteditable="true" spellcheck="true"></div>

        <div class="doc-footer">
          <p class="signature-label">Signature du thérapeute</p>
          <div class="signature-line"></div>
        </div>

      </div>
    </main>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="auth.js"></script>
<script>
  document.getElementById('logout').addEventListener('click', async () => {
    const sb = window.floritaSb;
    await sb.auth.signOut();
    window.location.href = 'login.html';
  });
</script>
<script src="https://unpkg.com/docx@8.5.0/build/index.umd.js"></script>
<script type="module" src="script.js"></script>
</body>
</html>
