<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Compte Rendu — Florita</title>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Quicksand', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    .layout { display: flex; min-height: 100vh; }

    .main { flex: 1; padding: 2.6rem 3rem; }

    .page-head {
      display: flex; align-items: center; justify-content: flex-end;
      margin-bottom: 2rem;
    }

    @media (max-width: 820px) {
      .main { padding: 1.5rem 1.2rem; }
    }
  </style>
</head>
<body>
<div class="layout">

  <aside class="sidebar" id="sidebar"></aside>

  <div class="main">
    <div class="page-head">
      <button id="btn-word" class="btn-word" aria-label="Télécharger le compte rendu en Word">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="16" y1="13" x2="8" y2="13"/>
          <line x1="16" y1="17" x2="8" y2="17"/>
        </svg>
        <span>Télécharger en Word</span>
      </button>
    </div>

    <main class="workspace" style="padding-top: 0;">
      <div class="document">

        <div class="doc-meta">
          <div class="practice">
            <div class="practice-name">Cabinet d'Ergothérapie</div>
            <div class="practice-address">12 rue des Lilas — 75000 Paris</div>
          </div>
          <div id="doc-date" class="doc-date"></div>
        </div>

        <div class="separator"></div>

        <div class="patient-block">
          <div class="patient-row">
            <span class="field-label">Patient</span>
            <span class="field-value" id="field-patient" contenteditable="true" spellcheck="false">—</span>
          </div>
          <div class="patient-row">
            <span class="field-label">Date de naissance</span>
            <span class="field-value" id="field-dob" contenteditable="true" spellcheck="false">—</span>
          </div>
          <div class="patient-row">
            <span class="field-label">Thérapeute</span>
            <span class="field-value" id="field-therapist" contenteditable="true" spellcheck="false">—</span>
          </div>
        </div>

        <h2 class="doc-title">Compte Rendu d'Évaluation Ergothérapique</h2>

        <div id="cr-editor" class="cr-editor" contenteditable="true" spellcheck="true"></div>

        <div class="doc-footer">
          <p class="signature-label">Signature du thérapeute</p>
          <div class="signature-line"></div>
        </div>

      </div>
    </main>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="sidebar.js"></script>
<script src="auth.js"></script>
<script src="https://unpkg.com/docx@8.5.0/build/index.umd.js"></script>
<script type="module" src="script.js"></script>
</body>
</html>
