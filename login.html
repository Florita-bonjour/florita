<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connexion — Florita</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    body { background: #FAFAF8; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .auth-card {
      background: #fff; border-radius: 12px; padding: 2.5rem;
      width: 100%; max-width: 400px; box-shadow: 0 4px 24px rgba(0,0,0,0.06);
    }
    .auth-logo {
      font-family: 'Quicksand', sans-serif; font-size: 1.5rem; font-weight: 700;
      color: #6B4C9A; text-align: center; margin-bottom: 0.3rem;
    }
    .auth-logo span { color: #D4537E; }
    .auth-subtitle { text-align: center; font-size: 0.85rem; color: #637080; margin-bottom: 1.5rem; }
    .auth-tabs {
      display: flex; gap: 0; margin-bottom: 1.5rem; border-bottom: 2px solid #E8E4F0;
    }
    .auth-tab {
      flex: 1; padding: 0.6rem; text-align: center; font-size: 0.9rem; font-weight: 600;
      color: #637080; cursor: pointer; border-bottom: 2px solid transparent;
      margin-bottom: -2px; transition: all 0.15s; background: none; border-top: none;
      border-left: none; border-right: none; font-family: inherit;
    }
    .auth-tab.active { color: #6B4C9A; border-bottom-color: #6B4C9A; }
    .auth-form { display: none; }
    .auth-form.active { display: block; }
    .auth-card label { display: block; font-size: 0.82rem; font-weight: 500; color: #637080; margin-bottom: 0.3rem; }
    .auth-card input {
      width: 100%; padding: 0.6rem 0.8rem; border: 1px solid #D0D7DE;
      border-radius: 6px; font-family: inherit; font-size: 0.9rem; margin-bottom: 1rem;
      outline: none; transition: border-color 0.15s; box-sizing: border-box;
    }
    .auth-card input:focus { border-color: #6B4C9A; }
    .auth-card select {
      width: 100%; padding: 0.6rem 0.8rem; border: 1px solid #D0D7DE;
      border-radius: 6px; font-family: inherit; font-size: 0.9rem; margin-bottom: 1rem;
      background: #fff; cursor: pointer; box-sizing: border-box;
    }
    .auth-btn {
      width: 100%; padding: 0.7rem; background: #6B4C9A; color: #fff;
      border: none; border-radius: 6px; font-family: inherit; font-size: 0.95rem;
      font-weight: 600; cursor: pointer; transition: background 0.15s;
    }
    .auth-btn:hover { background: #5A3D87; }
    .auth-msg {
      text-align: center; font-size: 0.84rem; margin-top: 1rem; padding: 0.5rem;
      border-radius: 6px; display: none;
    }
    .auth-msg.error { display: block; background: #FFF0F0; color: #D94F4F; }
    .auth-msg.success { display: block; background: #E6F5EE; color: #2D9F6F; }
  </style>
</head>
<body>
  <div class="auth-card">
    <div class="auth-logo">florita<span>.</span></div>
    <div class="auth-subtitle">Votre assistant CR ergothérapique</div>

    <div class="auth-tabs">
      <button class="auth-tab active" onclick="showTab('login')">Connexion</button>
      <button class="auth-tab" onclick="showTab('register')">Inscription</button>
    </div>

    <!-- Connexion -->
    <form id="form-login" class="auth-form active" onsubmit="handleLogin(event)">
      <label>Email</label>
      <input type="email" id="login-email" placeholder="prenom@exemple.com" required>
      <label>Mot de passe</label>
      <input type="password" id="login-password" placeholder="••••••••" required>
      <button type="submit" class="auth-btn">Se connecter</button>
      <div id="login-msg" class="auth-msg"></div>
    </form>

    <!-- Inscription -->
    <form id="form-register" class="auth-form" onsubmit="handleRegister(event)">
      <label>Prénom et nom</label>
      <input type="text" id="reg-name" placeholder="Pauline Dupont" required>
      <label>Email professionnel</label>
      <input type="email" id="reg-email" placeholder="prenom@exemple.com" required>
      <label>Mot de passe</label>
      <input type="password" id="reg-password" placeholder="8 caractères minimum" minlength="8" required>
      <label>Type de compte</label>
      <select id="reg-type">
        <option value="liberal">Ergothérapeute libéral</option>
        <option value="structure">Structure</option>
        <option value="autre">Autre</option>
      </select>
      <button type="submit" class="auth-btn">Créer mon compte</button>
      <div id="reg-msg" class="auth-msg"></div>
    </form>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://ipflegbroqefhbucbnrv.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_iXkEAv5hsTgtaqSuza7maA_E17o44dl';
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // Si déjà connecté, rediriger vers le formulaire
    sb.auth.getSession().then(({ data: { session } }) => {
      if (session) window.location.href = 'formulaire.html';
    });

    function showTab(tab) {
      document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
      if (tab === 'login') {
        document.querySelectorAll('.auth-tab')[0].classList.add('active');
        document.getElementById('form-login').classList.add('active');
      } else {
        document.querySelectorAll('.auth-tab')[1].classList.add('active');
        document.getElementById('form-register').classList.add('active');
      }
    }

    async function handleLogin(e) {
      e.preventDefault();
      const msg = document.getElementById('login-msg');
      msg.className = 'auth-msg';
      msg.style.display = 'none';
      const email = document.getElementById('login-email').value;
      const password = document.getElementById('login-password').value;
      const { error } = await sb.auth.signInWithPassword({ email, password });
      if (error) {
        msg.textContent = error.message === 'Invalid login credentials'
          ? 'Email ou mot de passe incorrect.'
          : error.message;
        msg.className = 'auth-msg error';
      } else {
        window.location.href = 'formulaire.html';
      }
    }

    async function handleRegister(e) {
      e.preventDefault();
      const msg = document.getElementById('reg-msg');
      msg.className = 'auth-msg';
      msg.style.display = 'none';
      const name = document.getElementById('reg-name').value;
      const email = document.getElementById('reg-email').value;
      const password = document.getElementById('reg-password').value;
      const type = document.getElementById('reg-type').value;
      const { error } = await sb.auth.signUp({
        email,
        password,
        options: { data: { full_name: name, account_type: type } }
      });
      if (error) {
        msg.textContent = error.message;
        msg.className = 'auth-msg error';
      } else {
        msg.textContent = 'Compte créé ! Vérifiez votre email pour confirmer.';
        msg.className = 'auth-msg success';
      }
    }
  </script>
</body>
</html>
