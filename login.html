<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connexion — Florita</title>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Quicksand', sans-serif; min-height: 100vh; display: flex; background: #FAFAF8; }

    .split { display: flex; width: 100%; min-height: 100vh; }

    .split-left {
      flex: 1; background: linear-gradient(135deg, #6B4C9A 0%, #D4537E 100%);
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      padding: 3rem; color: #fff; text-align: center; position: relative; overflow: hidden;
    }
    .split-left::before {
      content: ''; position: absolute; top: -80px; right: -80px;
      width: 300px; height: 300px; border-radius: 50%;
      background: rgba(255,255,255,0.06);
    }
    .split-left::after {
      content: ''; position: absolute; bottom: -100px; left: -60px;
      width: 250px; height: 250px; border-radius: 50%;
      background: rgba(255,255,255,0.04);
    }

    .logo-big { margin-bottom: 1.2rem; }
    .logo-text-big { font-size: 2.8rem; font-weight: 700; color: #fff; margin-bottom: 1rem; }
    .logo-text-big span { color: #F5C542; }
    .tagline {
      font-size: 1.1rem; font-weight: 500; color: rgba(255,255,255,0.85);
      line-height: 1.7; max-width: 320px;
    }
    .tagline strong { color: #F5C542; font-weight: 700; }
    .stat-badges { display: flex; gap: 8px; margin-top: 2rem; flex-wrap: wrap; justify-content: center; }
    .stat-badge {
      background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.15);
      border-radius: 20px; padding: 6px 16px; font-size: 0.82rem; color: rgba(255,255,255,0.9);
      font-weight: 600;
    }

    .split-right {
      flex: 1; background: #fff; display: flex; flex-direction: column;
      justify-content: center; align-items: center; padding: 3rem;
    }

    .auth-card { width: 100%; max-width: 380px; }
    .auth-tabs { display: flex; margin-bottom: 1.5rem; border-bottom: 2px solid #E8E4F0; }
    .auth-tab {
      flex: 1; padding: 0.7rem; text-align: center; font-size: 0.95rem; font-weight: 600;
      color: #637080; cursor: pointer; border: none; border-bottom: 2px solid transparent;
      margin-bottom: -2px; background: none; font-family: inherit; transition: all 0.15s;
    }
    .auth-tab.active { color: #6B4C9A; border-bottom-color: #6B4C9A; }
    .auth-form { display: none; }
    .auth-form.active { display: block; }

    label { display: block; font-size: 0.82rem; font-weight: 600; color: #637080; margin-bottom: 0.3rem; }
    input[type="email"], input[type="password"], input[type="text"] {
      width: 100%; padding: 0.65rem 0.85rem; border: 1px solid #D0D7DE;
      border-radius: 6px; font-family: inherit; font-size: 0.9rem; margin-bottom: 1rem;
      outline: none; transition: border-color 0.15s;
    }
    input:focus { border-color: #6B4C9A; }
    select {
      width: 100%; padding: 0.65rem 0.85rem; border: 1px solid #D0D7DE;
      border-radius: 6px; font-family: inherit; font-size: 0.9rem; margin-bottom: 1rem;
      background: #fff; cursor: pointer;
    }

    .pw-wrap { position: relative; }
    .pw-wrap input { padding-right: 2.5rem; }
    .pw-toggle {
      position: absolute; right: 10px; top: 50%; transform: translateY(-70%);
      background: none; border: none; cursor: pointer; color: #637080; padding: 4px;
    }
    .pw-toggle:hover { color: #6B4C9A; }

    .auth-btn {
      width: 100%; padding: 0.75rem; background: #6B4C9A; color: #fff;
      border: none; border-radius: 6px; font-family: inherit; font-size: 1rem;
      font-weight: 700; cursor: pointer; transition: background 0.15s;
    }
    .auth-btn:hover { background: #5A3D87; }
    .auth-msg {
      text-align: center; font-size: 0.84rem; margin-top: 1rem; padding: 0.6rem;
      border-radius: 6px; display: none;
    }
    .auth-msg.error { display: block; background: #FFF0F0; color: #D94F4F; }
    .auth-msg.success { display: block; background: #E6F5EE; color: #2D9F6F; }

    @media (max-width: 768px) {
      .split { flex-direction: column; }
      .split-left { min-height: 200px; padding: 2rem; }
      .logo-text-big { font-size: 2rem; }
      .tagline { font-size: 0.95rem; }
    }
  </style>
</head>
<body>
  <div class="split">
    <div class="split-left">
      <div style="display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:1rem;">
        <svg width="48" height="30" viewBox="0 0 48 30">
          <path d="M2,28 A22,22 0 0,1 46,28" fill="none" stroke="rgba(255,255,255,0.95)" stroke-width="3.5" stroke-linecap="round"/>
          <path d="M7,28 A17,17 0 0,1 41,28" fill="none" stroke="rgba(255,255,255,0.75)" stroke-width="3.5" stroke-linecap="round"/>
          <path d="M12,28 A12,12 0 0,1 36,28" fill="none" stroke="rgba(255,255,255,0.55)" stroke-width="3" stroke-linecap="round"/>
          <path d="M17,28 A7,7 0 0,1 31,28" fill="none" stroke="rgba(255,255,255,0.38)" stroke-width="3" stroke-linecap="round"/>
          <path d="M22,28 A2,2 0 0,1 26,28" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="2.5" stroke-linecap="round"/>
        </svg>
        <div class="logo-text-big" style="margin-bottom:0;">florita<span>.</span></div>
      </div>
      <div class="tagline">
        Transformez vos notes de terrain en <strong>comptes rendus argumentés</strong>.
      </div>
      <div class="stat-badges">
        <div class="stat-badge">Conforme ANFE 2026</div>
      </div>
    </div>

    <div class="split-right">
      <div class="auth-card">
        <div class="auth-tabs">
          <button class="auth-tab active" onclick="showTab('login')">Connexion</button>
          <button class="auth-tab" onclick="showTab('register')">Inscription</button>
        </div>

        <!-- Connexion -->
        <form id="form-login" class="auth-form active" onsubmit="handleLogin(event)">
          <label>Email</label>
          <input type="email" id="login-email" placeholder="prenom@exemple.com" required>
          <label>Mot de passe</label>
          <div class="pw-wrap">
            <input type="password" id="login-password" placeholder="••••••••" required>
            <button type="button" class="pw-toggle" onclick="togglePw('login-password', this)">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
          <button type="submit" class="auth-btn">Se connecter</button>
          <div id="login-msg" class="auth-msg"></div>
        </form>

        <!-- Inscription -->
        <form id="form-register" class="auth-form" onsubmit="handleRegister(event)">
          <label>Prénom et nom</label>
          <input type="text" id="reg-name" placeholder="Pauline Dupont" required>
          <label>Email professionnel</label>
          <input type="email" id="reg-email" placeholder="prenom@exemple.com" required>
          <label>Mot de passe</label>
          <div class="pw-wrap">
            <input type="password" id="reg-password" placeholder="8 caractères minimum" minlength="8" required>
            <button type="button" class="pw-toggle" onclick="togglePw('reg-password', this)">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
          <label>Type de compte</label>
          <select id="reg-type">
            <option value="liberal">Ergothérapeute libéral</option>
            <option value="structure">Structure</option>
            <option value="autre">Autre</option>
          </select>
          <button type="submit" class="auth-btn">Créer mon compte</button>
          <div id="reg-msg" class="auth-msg"></div>
        </form>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://ipflegbroqefhbucbnrv.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_iXkEAv5hsTgtaqSuza7maA_E17o44dl';
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    sb.auth.getSession().then(({ data: { session } }) => {
      if (session) window.location.href = 'formulaire.html';
    });

    function showTab(tab) {
      document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
      if (tab === 'login') {
        document.querySelectorAll('.auth-tab')[0].classList.add('active');
        document.getElementById('form-login').classList.add('active');
      } else {
        document.querySelectorAll('.auth-tab')[1].classList.add('active');
        document.getElementById('form-register').classList.add('active');
      }
    }

    function togglePw(id, btn) {
      const input = document.getElementById(id);
      if (input.type === 'password') {
        input.type = 'text';
        btn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>';
      } else {
        input.type = 'password';
        btn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';
      }
    }

    async function handleLogin(e) {
      e.preventDefault();
      const msg = document.getElementById('login-msg');
      msg.className = 'auth-msg'; msg.style.display = 'none';
      const email = document.getElementById('login-email').value;
      const password = document.getElementById('login-password').value;
      const { error } = await sb.auth.signInWithPassword({ email, password });
      if (error) {
        msg.textContent = error.message === 'Invalid login credentials'
          ? 'Email ou mot de passe incorrect.'
          : error.message;
        msg.className = 'auth-msg error';
      } else {
        window.location.href = 'formulaire.html';
      }
    }

    async function handleRegister(e) {
      e.preventDefault();
      const msg = document.getElementById('reg-msg');
      msg.className = 'auth-msg'; msg.style.display = 'none';
      const name = document.getElementById('reg-name').value;
      const email = document.getElementById('reg-email').value;
      const password = document.getElementById('reg-password').value;
      const type = document.getElementById('reg-type').value;
      const { error } = await sb.auth.signUp({
        email, password,
        options: { data: { full_name: name, account_type: type } }
      });
      if (error) {
        if (error.status === 429) {
          msg.textContent = 'Trop de tentatives. Veuillez patienter quelques minutes.';
        } else {
          msg.textContent = error.message;
        }
        msg.className = 'auth-msg error';
      } else {
        msg.textContent = 'Compte créé ! Vérifiez votre email pour confirmer votre inscription.';
        msg.className = 'auth-msg success';
      }
    }
  </script>
</body>
</html>
